# config/packages/framework.yaml
framework:
    secret: '%env(APP_SECRET)%'
    session: true

    rate_limiter:
        proxy_limiter:
            policy: 'sliding_window'
            limit: 100
            interval: '15 minutes'

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file