version: "3.9"

networks:
  portal_net:
    driver: bridge

volumes:
  mariadb_data:

services:

  portal:
    build:
      context: .
      dockerfile: Dockerfile
    security_opt:
      - label=disable        # ← disables SELinux labeling, works on all distros
    userns_mode: "keep-id"
    user: "1000:1000" 
    volumes:
      - .:/var/www/portal    # ← no :Z flag anymore
    networks:
      - portal_net
    ports:
      - "5173:5173"
      - "9000:9000"
    env_file: .env

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    security_opt:
      - label=disable
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/portal
    networks:
      - portal_net

  db:
    image: mariadb:11.3
    security_opt:
      - label=disable
    env_file: .env
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - portal_net
